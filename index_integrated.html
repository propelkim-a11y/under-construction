<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>활터에 있소 - 국궁 자세 분석</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <!-- PWA 및 테마 컬러 설정 -->
    <meta name="theme-color" content="#050507">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="viewport-container">
        
        <!-- [1] 인트로 장면 (신규 추가) -->
        <section id="scene-intro" class="app-scene active">
            <div class="intro-content">
                <div class="intro-logo-area">
                    <div class="app-icon-display"></div>
                    <h1 class="app-title-main">활터에 있소</h1>
                    <p class="app-subtitle">AI 국궁 자세 분석 시스템</p>
                </div>
                
                <div class="intro-feature-cards">
                    <div class="feature-card">
                        <span class="feature-icon">🎯</span>
                        <div class="feature-text">
                            <h3>정밀 각도 분석</h3>
                            <p>자이로 센서 기반 고각 보정</p>
                        </div>
                    </div>
                    <div class="feature-card">
                        <span class="feature-icon">📹</span>
                        <div class="feature-text">
                            <h3>고속 촬영 지원</h3>
                            <p>최대 120fps 프레임 분석</p>
                        </div>
                    </div>
                </div>

                <div class="intro-action-area">
                    <button id="btn-enter-app" class="action-btn-main primary">분석 시작하기</button>
                    <p class="intro-footer-note">카메라 및 센서 권한이 필요합니다.</p>
                </div>
            </div>
        </section>

        <!-- [2] 촬영 장면 (기존 scene-record) -->
        <section id="scene-record" class="app-scene">
            <div class="camera-container">
                <video id="camera-preview" autoplay playsinline muted></video>
                
                <!-- 수평계 오버레이 -->
                <div id="gyro-leveler-overlay">
                    <div id="gyro-horizon-line"></div>
                    <div id="gyro-vertical-line"></div>
                </div>

                <!-- 상단 정보바 -->
                <div class="top-info-bar">
                    <div id="record-status" class="status-indicator">대기 중</div>
                    <div class="fps-selector">
                        <button class="fps-btn" data-fps="30">30</button>
                        <button class="fps-btn active" data-fps="60">60</button>
                        <button class="fps-btn" data-fps="120">120</button>
                    </div>
                </div>

                <!-- 촬영 컨트롤 하단 패널 -->
                <div class="unified-panel-box bottom-panel">
                    <div class="panel-handle"></div>
                    <div class="control-row">
                        <button id="btn-go-analyze" class="menu-btn">분석 목록</button>
                        <div class="record-trigger-area">
                            <button id="btn-record-toggle" class="record-btn-large"></button>
                        </div>
                        <label for="video-input" class="menu-btn">영상 불러오기</label>
                        <input type="file" id="video-input" accept="video/*" style="display:none;">
                    </div>
                </div>
            </div>
        </section>

        <!-- [3] 분석 장면 (기존 scene-analyze) -->
        <section id="scene-analyze" class="app-scene">
            <div class="analysis-container">
                <div id="video-viewport">
                    <video id="main-video" playsinline muted></video>
                    <canvas id="draw-canvas"></canvas>
                </div>

                <!-- 분석 도구 상단 바 -->
                <div class="analysis-top-bar">
                    <button id="btn-go-record" class="back-btn">← 촬영</button>
                    <div id="angle-report" class="angle-display">0.0°</div>
                </div>

                <!-- 분석 컨트롤 하단 패널 -->
                <div class="unified-panel-box analysis-panel">
                    <div class="panel-handle"></div>
                    
                    <!-- 비디오 슬라이더 -->
                    <div class="video-control-row">
                        <input type="range" id="video-slider" min="0" max="1" step="0.0001" value="0">
                    </div>

                    <!-- 프레임 제어 및 도구 -->
                    <div class="tool-row">
                        <button id="btn-frame-prev" class="tool-btn">◀</button>
                        <button id="btn-play-pause" class="tool-btn play"></button>
                        <button id="btn-frame-next" class="tool-btn">▶</button>
                    </div>

                    <div class="action-row">
                        <button id="btn-draw" class="action-btn-sub">선 그리기</button>
                        <button id="btn-capture" class="action-btn-sub">캡처 저장</button>
                        <button id="btn-reset" class="action-btn-sub">초기화</button>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <!-- 스크립트 로드 순서 유지 -->
    <script src="js/app_core.js"></script>
    <script src="js/sensor.js"></script>
    <script src="js/analyzer.js"></script>
    <script src="js/app_gesture.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
