<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arrow Trajectory Simulator</title>
    
    <!-- 스타일시트 및 PWA 매니페스트 연동 -->
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png" type="image/png">

    <!-- 💡 [PWA 패치] iOS Safari 환경 네이티브 독립 구동 메타 태그 추가 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="화살시뮬">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#0071e3">

    <!-- 서비스 워커 브라우저 상주 등록 스크립트 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then((reg) => console.log("서비스 워커 등록 완료, 범위:", reg.scope))
                    .catch(err => console.error("서비스 워커 등록 실패", err));
            });
        }
    </script>
</head>
<body>

<!-- 인트로 및 공지사항 모달 팝업 -->
<div id="introModal" class="intro-modal">
    <div class="intro-content" style="position: relative;">
    
        <!-- 💡 [UX 패치] 조회수 배지 우측 상단 배치 보정 (반응형 겹침 방지 여백 확보) -->
        <div class="intro-badge-wrapper" style="position: absolute; top: 15px; right: 15px; z-index: 10; line-height: 0;">
            <a href="https://hits.sh/propelkim-a11y.github.io/Arrow-Trajectory-Simulation/" target="_blank" rel="noopener noreferrer">
                <img alt="Hits" src="https://hits.sh/propelkim-a11y.github.io/Arrow-Trajectory-Simulation.svg?style=flat-square&label=Users&extraCount=97&color=0045c6" style="display: block; max-width: 100%; height: auto;"/>
            </a>
        </div>
   
        <div class="intro-header" style="margin-top: 10px;">
            <span class="intro-logo">🚀</span>
            <h2>국궁 탄도 시뮬레이터</h2>
        </div>
        <div class="intro-body">
            <h3>📢 시스템 공지사항</h3>
            <ul>
                <li><strong>기능 추가:</strong> 과녁높이 차이 0m에서 표보기를 추가했습니다. 높이차이에 따라 추가 예정입니다.</li>
                <li><strong>사용 안내:</strong> 바람, 과녁 고도차, 사수의 위치를 변경하며 정밀한 조준점 변화를 테스트해 보세요.</li>
                <li>본 프로그램은 국궁 표준 제원을 바탕으로 제작된 시뮬레이터입니다.</li>
            </ul>
        </div>
        <div class="intro-footer">
            <button class="intro-close-btn" onclick="closeIntro()">시뮬레이터 시작하기</button>
        </div>
    </div>
</div>

<!-- 상단 60% 영역: 메인 스크린 및 시뮬레이터 캔버스 -->
<div class="main-screen">
    <h1>Arrow Trajectory</h1>
    
    <div class="segmented-control">
        <button class="segment-btn" onclick="changeView('front', this)">정면</button>
        <button class="segment-btn active" onclick="changeView('side', this)">측면</button>
        <button class="segment-btn" onclick="changeView('top', this)">평면</button>
        <button class="segment-btn" onclick="changeView('target', this)">과녁</button>
    </div>
    
    <div class="sim-container">
        <canvas id="simCanvas"></canvas>
        <button id="draggableFireBtn" class="fire-btn">발시</button>
    </div>
</div>

<!-- 하단 40% 영역: 라운드 카드형 설정 및 결과 패널 컨테이너 -->
<div id="panel-container">
    
    <!-- [탭 1] 화살 설정 -->
    <div class="fixed-panel active" id="panel-arrow">
        <div class="panel-card">
            <div class="panel-title">화살 설정</div>
            <div class="form-grid">
                <div class="form-group"><label>화살 무게</label><div class="input-wrapper"><input type="number" id="weight" value="25" inputmode="decimal"><span class="unit">g</span></div></div>
                <div class="form-group"><label>화살 직경</label><div class="input-wrapper"><input type="number" id="diameter" value="5.5" step="0.1" inputmode="decimal"><span class="unit">mm</span></div></div>
                <div class="form-group"><label>항력 계수</label><div class="input-wrapper"><input type="number" id="dragCoeff" value="0.35" step="0.01" inputmode="decimal"><span class="unit">cd</span></div></div>
                <div class="form-group"><label>양력 계수</label><div class="input-wrapper"><input type="number" id="liftCoeff" value="0.05" step="0.01" inputmode="decimal"><span class="unit">cl</span></div></div>
            </div>
        </div>
    </div>

    <!-- [탭 2] 사법 설정 -->
    <div class="fixed-panel" id="panel-method">
        <div class="panel-card">
            <div class="panel-title">사법 설정</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>발시 고각</label>
                    <div class="input-wrapper">
                        <!-- 💡 [UX 패치] 모바일에서 바로 숫자 키패드가 뜨도록 inputmode 수치 정밀화 -->
                        <input type="text" id="angle" value="30" inputmode="decimal" pattern="^-?[0-9]*\.?[0-9]*$">
                        <span class="unit">°</span>
                    </div>
                </div>
                <div class="form-group"><label>초기 속도</label><div class="input-wrapper"><input type="number" id="velocity" value="50" inputmode="decimal"><span class="unit">m/s</span></div></div>
                <div class="form-group">
                    <label>앞뒤 각도</label>
                    <div class="input-wrapper">
                        <input type="text" id="yawAngle" value="0" inputmode="decimal" pattern="^-?[0-9]*\.?[0-9]*$">
                        <span class="unit">°</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>발시 높이</label>
                    <div class="input-wrapper">
                        <input type="number" id="launchHeight" value="1.5" step="0.1" inputmode="decimal">
                        <span class="unit">m</span>
                    </div>
                </div>
                  
                <div class="form-group">
                    <label for="launchZ">궁사 위치</label>
                    <div class="input-wrapper">
                        <input type="text" id="launchZ" value="0" min="-10" max="10" step="0.5" inputmode="decimal">
                        <span class="unit">m</span>
                    </div>
                </div>
				
                <div class="form-group" style="grid-column: span 2; background: rgba(0,113,227,0.05); margin-top: 5px; border-radius: 8px; padding: 4px 8px;">
                    <label style="color: #0071e3; font-weight: 700;">표보기 조준선 사용</label>
                    <div class="input-wrapper" style="display: flex; align-items: center; justify-content: flex-end;">
                        <input type="checkbox" id="useLos" style="width: 20px; height: 20px; cursor: pointer;">
                    </div>
                </div>

                <div class="form-group">
                    <label>높이 Y</label>
                    <div class="input-wrapper">
                        <input type="text" id="losTargetY" value="1.3" inputmode="decimal">
                        <span class="unit">m</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>앞뒤 Z</label>
                    <div class="input-wrapper">
                        <input type="text" id="losTargetZ" value="0.0" inputmode="decimal">
                        <span class="unit">m</span>
                    </div>
                </div>				
            </div> 
        </div>
    </div>
</div>

</body>
</html>
